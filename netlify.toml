[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "frontend/dist"


[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/*"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_VERSION = "20"
